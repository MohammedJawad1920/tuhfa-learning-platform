name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  lint:
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint source
        run: npx eslint src/

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx vitest run tests/unit/

  component-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run component tests
        run: npx vitest run tests/component/

  integration-tests:
    runs-on: ubuntu-latest
    needs: component-tests
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start Prism mock server
        run: npm run mock > /tmp/mock-server.log 2>&1 &

      - name: Wait for mock server
        run: sleep 3

      - name: Run integration tests
        run: npx vitest run tests/integration/

  contract-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start Prism mock server
        run: npx prism mock ./docs/openapi.yaml --port 4011 > /tmp/prism.log 2>&1 &

      - name: Wait for Prism
        run: sleep 3

      - name: Run contract tests
        run: npx vitest run tests/contract/

      - name: Run coverage checks
        run: npm run test:coverage

  build:
    runs-on: ubuntu-latest
    needs: contract-tests
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          NEXT_PUBLIC_API_BASE_URL: "http://localhost:3000/api/v1"
          NODE_ENV: "production"
          ADMIN_PASSWORD: "test-admin-password-1234567890"
          SESSION_SECRET: "test-session-secret-12345678901234567890"
          SESSION_MAX_AGE_SECONDS: "86400"
          GITHUB_TOKEN: "test-token"
          GITHUB_REPO_OWNER: "test-owner"
          GITHUB_REPO_NAME: "test-repo"
          GITHUB_FILE_PATH: "data/lessons.json"
          GITHUB_BRANCH: "main"
          IA_ACCESS_KEY: "test-ia-key"
          IA_SECRET_KEY: "test-ia-secret"
          IA_COLLECTION_IDENTIFIER: "test-collection"
          IA_S3_ENDPOINT: "https://s3.us.archive.org"
          UPSTASH_REDIS_REST_URL: "https://test.upstash.io"
          UPSTASH_REDIS_REST_TOKEN: "test-token"
          REVALIDATION_SECRET: "test-revalidation-secret-32-char-minimum1234"
        run: npx next build
