name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read
  statuses: write

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  lint:
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint source
        run: npx eslint src/

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx vitest run tests/unit/

  component-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run component tests
        run: npx vitest run tests/component/

  integration-tests:
    runs-on: ubuntu-latest
    needs: component-tests
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start Prism mock server
        run: npm run mock > /tmp/mock-server.log 2>&1 &

      - name: Wait for mock server
        run: sleep 3

      - name: Run integration tests
        run: npx vitest run tests/integration/

  contract-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start Prism mock server
        run: npx prism mock ./docs/openapi.yaml --port 4011 > /tmp/prism.log 2>&1 &

      - name: Wait for Prism
        run: sleep 3

      - name: Run contract tests
        run: npx vitest run tests/contract/

      - name: Run coverage checks
        run: npm run test:coverage

  build:
    runs-on: ubuntu-latest
    needs: contract-tests
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          NEXT_PUBLIC_API_BASE_URL: "http://localhost:3000/api/v1"
          NODE_ENV: "production"
          ADMIN_PASSWORD: "test-admin-password-1234567890"
          SESSION_SECRET: "test-session-secret-12345678901234567890"
          SESSION_MAX_AGE_SECONDS: "86400"
          GITHUB_TOKEN: "test-token"
          GITHUB_REPO_OWNER: "test-owner"
          GITHUB_REPO_NAME: "test-repo"
          GITHUB_FILE_PATH: "data/lessons.json"
          GITHUB_BRANCH: "main"
          IA_ACCESS_KEY: "test-ia-key"
          IA_SECRET_KEY: "test-ia-secret"
          IA_COLLECTION_IDENTIFIER: "test-collection"
          IA_S3_ENDPOINT: "https://s3.us.archive.org"
          UPSTASH_REDIS_REST_URL: "https://test.upstash.io"
          UPSTASH_REDIS_REST_TOKEN: "test-token"
          ALLOWED_ORIGINS: "http://localhost:3000"
          REVALIDATION_SECRET: "test-revalidation-secret-32-char-minimum1234"
        run: npx next build

  lighthouse-ci:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          NEXT_PUBLIC_API_BASE_URL: "http://localhost:3000/api/v1"
          NODE_ENV: "production"
          ADMIN_PASSWORD: "test-admin-password-1234567890"
          SESSION_SECRET: "test-session-secret-12345678901234567890"
          SESSION_MAX_AGE_SECONDS: "86400"
          GITHUB_TOKEN: "test-token"
          GITHUB_REPO_OWNER: "test-owner"
          GITHUB_REPO_NAME: "test-repo"
          GITHUB_FILE_PATH: "data/lessons.json"
          GITHUB_BRANCH: "main"
          IA_ACCESS_KEY: "test-ia-key"
          IA_SECRET_KEY: "test-ia-secret"
          IA_COLLECTION_IDENTIFIER: "test-collection"
          IA_S3_ENDPOINT: "https://s3.us.archive.org"
          UPSTASH_REDIS_REST_URL: "https://test.upstash.io"
          UPSTASH_REDIS_REST_TOKEN: "test-token"
          ALLOWED_ORIGINS: "http://localhost:3000"
          REVALIDATION_SECRET: "test-revalidation-secret-32-char-minimum1234"
        run: npx next build

      - name: Start Next.js server
        env:
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          NEXT_PUBLIC_API_BASE_URL: "http://localhost:3000/api/v1"
          NODE_ENV: "production"
          ADMIN_PASSWORD: "test-admin-password-1234567890"
          SESSION_SECRET: "test-session-secret-12345678901234567890"
          SESSION_MAX_AGE_SECONDS: "86400"
          GITHUB_TOKEN: "test-token"
          GITHUB_REPO_OWNER: "test-owner"
          GITHUB_REPO_NAME: "test-repo"
          GITHUB_FILE_PATH: "data/lessons.json"
          GITHUB_BRANCH: "main"
          IA_ACCESS_KEY: "test-ia-key"
          IA_SECRET_KEY: "test-ia-secret"
          IA_COLLECTION_IDENTIFIER: "test-collection"
          IA_S3_ENDPOINT: "https://s3.us.archive.org"
          UPSTASH_REDIS_REST_URL: "https://test.upstash.io"
          UPSTASH_REDIS_REST_TOKEN: "test-token"
          ALLOWED_ORIGINS: "http://localhost:3000"
          REVALIDATION_SECRET: "test-revalidation-secret-32-char-minimum1234"
        run: npx next start > /tmp/nextjs.log 2>&1 &

      - name: Wait for Next.js
        run: |
          for i in {1..12}; do
            if curl -sSf http://localhost:3000 >/dev/null; then
              echo "Next.js is up"
              break
            fi
            echo "Waiting for Next.js... ($i/12)"
            sleep 5
          done
          curl -f http://localhost:3000 || (cat /tmp/nextjs.log && exit 1)

      - name: Warm up homepage
        run: |
          for i in {1..5}; do
            curl -sSf http://localhost:3000 >/dev/null
            sleep 2
          done

      - name: Verify Next.js is responsive
        run: |
          response=$(curl -w "\n%{http_code}" -s http://localhost:3000)
          http_code=$(echo "$response" | tail -n1)
          if [ "$http_code" != "200" ]; then
            echo "❌ Server returned HTTP $http_code"
            echo "Server logs:"
            tail -n 50 /tmp/nextjs.log || echo "No log file found"
            exit 1
          fi
          echo "✅ Server is responding with HTTP $http_code"

      - name: Run Lighthouse CI
        env:
          LIGHTHOUSE_URL: "http://localhost:3000"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LHCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx lhci autorun

  bundle-check:
    runs-on: ubuntu-latest
    needs: lighthouse-ci
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check bundle budgets
        env:
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          NEXT_PUBLIC_API_BASE_URL: "http://localhost:3000/api/v1"
          NODE_ENV: "production"
          ADMIN_PASSWORD: "test-admin-password-1234567890"
          SESSION_SECRET: "test-session-secret-12345678901234567890"
          SESSION_MAX_AGE_SECONDS: "86400"
          GITHUB_TOKEN: "test-token"
          GITHUB_REPO_OWNER: "test-owner"
          GITHUB_REPO_NAME: "test-repo"
          GITHUB_FILE_PATH: "data/lessons.json"
          GITHUB_BRANCH: "main"
          IA_ACCESS_KEY: "test-ia-key"
          IA_SECRET_KEY: "test-ia-secret"
          IA_COLLECTION_IDENTIFIER: "test-collection"
          IA_S3_ENDPOINT: "https://s3.us.archive.org"
          UPSTASH_REDIS_REST_URL: "https://test.upstash.io"
          UPSTASH_REDIS_REST_TOKEN: "test-token"
          ALLOWED_ORIGINS: "http://localhost:3000"
          REVALIDATION_SECRET: "test-revalidation-secret-32-char-minimum1234"
        run: ANALYZE=true npx next build
