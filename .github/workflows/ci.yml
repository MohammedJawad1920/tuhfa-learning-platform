name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  lint:
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  component-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:component

  integration-tests:
    runs-on: ubuntu-latest
    needs: component-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prism mock docs/openapi.yaml --port 4010 > /tmp/prism.log 2>&1 &
      - run: sleep 3
      - run: npm run test:integration

  contract-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prism mock docs/openapi.yaml --port 4011 > /tmp/prism.log 2>&1 &
      - run: sleep 3
      - run: npm run test:contract

  build:
    runs-on: ubuntu-latest
    needs: contract-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3000/api/v1
          NODE_ENV: production
          ADMIN_PASSWORD: test-admin-password-1234567890
          SESSION_SECRET: test-session-secret-12345678901234567890
          SESSION_MAX_AGE_SECONDS: "86400"
          GITHUB_TOKEN: test-token
          GITHUB_REPO_OWNER: test-owner
          GITHUB_REPO_NAME: test-repo
          GITHUB_FILE_PATH: data/lessons.json
          GITHUB_BRANCH: main
          IA_ACCESS_KEY: test-ia-key
          IA_SECRET_KEY: test-ia-secret
          IA_COLLECTION_IDENTIFIER: test-collection
          IA_S3_ENDPOINT: https://s3.us.archive.org
          UPSTASH_REDIS_REST_URL: https://test.upstash.io
          UPSTASH_REDIS_REST_TOKEN: test-token
          REVALIDATION_SECRET: test-revalidation-secret-32-char-minimum1234

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx @lhci/cli autorun

  bundle-check:
    runs-on: ubuntu-latest
    needs: lighthouse
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
